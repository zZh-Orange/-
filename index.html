<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>毛绒绒</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #201a2e;
  --panel: #2a2338;
  --panel2: #342c44;
  --line: #453a5c;
  --text: #efe9f5;
  --dim: #9c8fb5;
  --cream: #f5e9d8;
  --accent: #d4a373;
  --pink: #e8a0b4;
  --good: #8fce9f;
  --bad: #e08585;
}
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'PingFang SC','Segoe UI','Microsoft YaHei',sans-serif;
  display: flex; justify-content: center;
  min-height: 100vh;
}
.app {
  width: 100%; max-width: 460px;
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  padding: 10px 12px;
  gap: 8px;
}

/* ── 顶栏 ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 2px 4px;
}
.title { font-size: .95em; letter-spacing: 4px; color: var(--cream); }
.top-btns { display: flex; gap: 8px; }
.icon-btn {
  background: var(--panel); border: 1px solid var(--line);
  color: var(--dim); border-radius: 10px;
  padding: 5px 11px; font-size: .8em; cursor: pointer;
}
.icon-btn:active { transform: scale(.95); }

/* ── 数值条 ── */
.stats {
  display: flex; gap: 8px;
}
.stat {
  flex: 1; background: var(--panel); border: 1px solid var(--line);
  border-radius: 12px; padding: 7px 12px;
  display: flex; align-items: baseline; gap: 8px;
}
.stat .label { font-size: .68em; color: var(--dim); letter-spacing: 1px; }
.stat .num { font-size: 1.05em; color: var(--cream); font-weight: 600; }
.stat .sub { font-size: .62em; color: var(--dim); margin-left: auto; }
.stat.clickable { cursor: pointer; }
.stat.clickable:active { background: var(--panel2); }

/* ── 舞台 ── */
.stage {
  position: relative;
  background: radial-gradient(ellipse at 50% 120%, #2d2540 0%, var(--bg) 75%);
  border-radius: 18px;
  display: flex; justify-content: center; align-items: center;
  min-height: 220px;
  overflow: hidden;
  flex-shrink: 0;
}
#fluffCanvas { cursor: pointer; touch-action: manipulation; }

/* ── 四维反应区 ── */
.reaction {
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 14px; padding: 10px 12px;
  font-size: .8em; line-height: 1.65;
  min-height: 76px;
  overflow-y: auto;
  flex-shrink: 0;
  max-height: 150px;
}
.reaction .dim-row { display: flex; gap: 7px; margin-bottom: 3px; align-items: baseline; }
.reaction .tag {
  flex-shrink: 0;
  font-size: .78em; padding: 1px 8px; border-radius: 8px;
  letter-spacing: 1px;
}
.tag.emo  { background: rgba(232,160,180,.16); color: var(--pink); }
.tag.mind { background: rgba(156,143,181,.16); color: var(--dim); }
.tag.act  { background: rgba(212,163,115,.16); color: var(--accent); }
.tag.talk { background: rgba(143,206,159,.14); color: var(--good); }
.reaction .placeholder { color: var(--dim); font-size: .9em; text-align: center; padding-top: 18px; }
.reaction .thinking { color: var(--dim); text-align: center; padding-top: 18px; }

/* ── 历史区 ── */
.history {
  flex: 1; overflow-y: auto;
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 14px; padding: 10px 12px;
  font-size: .76em; line-height: 1.6;
  display: flex; flex-direction: column; gap: 8px;
  min-height: 60px;
}
.msg { max-width: 88%; padding: 6px 11px; border-radius: 12px; word-break: break-word; }
.msg.user { align-self: flex-end; background: #3d3252; border-bottom-right-radius: 4px; }
.msg.fluff { align-self: flex-start; background: var(--panel2); border-bottom-left-radius: 4px; }
.msg.sys { align-self: center; color: var(--dim); background: none; font-size: .88em; padding: 0; }
.msg .m-emo { color: var(--pink); font-size: .88em; }
.msg .m-act { color: var(--accent); font-size: .88em; }

/* ── 输入区 ── */
.inputbar {
  display: flex; gap: 8px; flex-shrink: 0;
}
.inputbar input {
  flex: 1; background: var(--panel); border: 1px solid var(--line);
  border-radius: 14px; padding: 11px 14px;
  color: var(--text); font-size: .85em; outline: none;
}
.inputbar input:focus { border-color: var(--accent); }
.inputbar button {
  background: var(--accent); border: none; border-radius: 14px;
  color: #2a2338; font-weight: 600; padding: 0 20px;
  font-size: .85em; cursor: pointer;
}
.inputbar button:disabled { opacity: .4; }
.inputbar button:active { transform: scale(.96); }

/* ── 弹层通用 ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.55);
  display: none; justify-content: center; align-items: center;
  z-index: 50; padding: 16px;
}
.overlay.show { display: flex; }
.sheet {
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 18px; padding: 18px;
  width: 100%; max-width: 400px;
  max-height: 82vh; overflow-y: auto;
}
.sheet h3 { font-size: .9em; color: var(--cream); letter-spacing: 2px; margin-bottom: 14px; }
.sheet .row { margin-bottom: 13px; }
.sheet label { display: block; font-size: .72em; color: var(--dim); margin-bottom: 5px; letter-spacing: 1px; }
.sheet input[type=text], .sheet input[type=password], .sheet textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--line);
  border-radius: 10px; padding: 9px 12px;
  color: var(--text); font-size: .82em; outline: none;
}
.sheet textarea { resize: none; height: 64px; }
.sheet input[type=range] { width: 100%; accent-color: var(--accent); }
.range-val { font-size: .75em; color: var(--accent); float: right; }
.sheet .btnrow { display: flex; gap: 8px; margin-top: 16px; }
.sheet .btnrow button {
  flex: 1; padding: 10px; border-radius: 12px; border: none;
  font-size: .82em; cursor: pointer; font-weight: 600;
}
.btn-main { background: var(--accent); color: #2a2338; }
.btn-ghost { background: var(--panel2); color: var(--dim); border: 1px solid var(--line) !important; }
.btn-danger { background: rgba(224,133,133,.15); color: var(--bad); border: 1px solid rgba(224,133,133,.3) !important; }

/* 亲密值调整 */
.delta-btns { display: flex; gap: 6px; }
.delta-btns button {
  flex: 1; padding: 9px 0; border-radius: 10px; border: 1px solid var(--line);
  background: var(--bg); color: var(--text); font-size: .85em; cursor: pointer;
}
.delta-btns button.sel { border-color: var(--accent); color: var(--accent); background: rgba(212,163,115,.1); }

/* 存档槽位 */
.slot {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 12px; margin-bottom: 8px;
}
.slot .info { flex: 1; font-size: .78em; }
.slot .info .name { color: var(--cream); }
.slot .info .meta { color: var(--dim); font-size: .85em; margin-top: 2px; }
.slot button {
  padding: 6px 10px; border-radius: 8px; border: 1px solid var(--line);
  background: var(--panel2); color: var(--dim); font-size: .72em; cursor: pointer;
}
.slot.current { border-color: var(--accent); }

select {
  width: 100%; background: var(--bg); border: 1px solid var(--line);
  border-radius: 10px; padding: 9px 12px;
  color: var(--text); font-size: .82em; outline: none;
  appearance: none;
}

.toast {
  position: fixed; top: 18px; left: 50%; transform: translateX(-50%) translateY(-8px);
  background: var(--panel2); border: 1px solid var(--line);
  color: var(--cream); font-size: .78em;
  padding: 8px 18px; border-radius: 20px;
  opacity: 0; transition: all .3s; z-index: 99; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="title">毛绒绒</div>
    <div class="top-btns">
      <button class="icon-btn" onclick="openSheet('saveSheet')">存档</button>
      <button class="icon-btn" onclick="openSheet('setSheet')">设置</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <span class="label">M值</span>
      <span class="num" id="mVal">0</span>
      <span class="sub" id="mStage">阶段1</span>
    </div>
    <div class="stat clickable" onclick="openSheet('loveSheet')">
      <span class="label">亲密值</span>
      <span class="num" id="loveVal">0</span>
      <span class="sub">点我调整</span>
    </div>
  </div>

  <div class="stage">
    <canvas id="fluffCanvas" width="340" height="220"></canvas>
  </div>

  <div class="reaction" id="reactionBox">
    <div class="placeholder">戳戳它，或者在下面说点什么～</div>
  </div>

  <div class="history" id="historyBox"></div>

  <div class="inputbar">
    <input type="text" id="userInput" placeholder="动作或想说的话…" autocomplete="off">
    <button id="sendBtn" onclick="send()">发送</button>
  </div>
</div>

<!-- 亲密值调整 -->
<div class="overlay" id="loveSheet">
  <div class="sheet">
    <h3>调整亲密值（当前 <span id="loveNow">0</span>）</h3>
    <div class="row">
      <label>变动</label>
      <div class="delta-btns" id="deltaBtns">
        <button data-d="-3">-3</button><button data-d="-2">-2</button><button data-d="-1">-1</button>
        <button data-d="1">+1</button><button data-d="2">+2</button><button data-d="3">+3</button>
      </div>
    </div>
    <div class="row">
      <label>原因（必填，毛绒绒看得到）</label>
      <textarea id="loveReason" placeholder="为什么加/减这个分…"></textarea>
    </div>
    <div class="btnrow">
      <button class="btn-ghost" onclick="closeSheet('loveSheet')">取消</button>
      <button class="btn-main" onclick="applyLove()">确定</button>
    </div>
  </div>
</div>

<!-- 设置 -->
<div class="overlay" id="setSheet">
  <div class="sheet">
    <h3>设置</h3>
    <div class="row">
      <label>DeepSeek API Key</label>
      <input type="password" id="apiKey" placeholder="sk-…">
    </div>
    <div class="row">
      <label>temperature <span class="range-val" id="tempVal">1.3</span></label>
      <input type="range" id="tempRange" min="0" max="2" step="0.1" value="1.3">
    </div>
    <div class="row">
      <label>top_p <span class="range-val" id="toppVal">0.95</span></label>
      <input type="range" id="toppRange" min="0.1" max="1" step="0.05" value="0.95">
    </div>
    <div class="row">
      <label>effort（高 = 用 deepseek-reasoner，反应慢但更聪明）</label>
      <select id="effortSel">
        <option value="normal">普通（deepseek-chat）</option>
        <option value="high">高（deepseek-reasoner）</option>
      </select>
    </div>
    <div class="btnrow">
      <button class="btn-ghost" onclick="closeSheet('setSheet')">关闭</button>
      <button class="btn-main" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<!-- 存档 -->
<div class="overlay" id="saveSheet">
  <div class="sheet">
    <h3>存档槽位</h3>
    <div id="slotList"></div>
    <div class="btnrow">
      <button class="btn-ghost" onclick="closeSheet('saveSheet')">关闭</button>
      <button class="btn-danger" onclick="resetCurrent()">重置当前进度</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================= 状态 ================= */
const SLOT_COUNT = 3;
let state = {
  slot: 1,
  m: 0,
  love: 0,
  history: [],       // {role:'user'|'fluff'|'sys', text, emo?, mind?, act?, talk?}
  loveLog: [],       // {delta, reason, t}
};
let settings = {
  apiKey: '', temp: 1.3, topp: 0.95, effort: 'normal',
};
let busy = false;

function stageOf(m) { return Math.min(5, Math.floor(m / 20) + 1); }

const STAGE_DESC = {
  1: '阶段1（M值0-19）：暗搓搓期待被欺负。被动，嘴上抗拒身体诚实，被玩弄时嘴上说不要但明显很享受，绝不主动开口要求。',
  2: '阶段2（M值20-39）：偷偷期待更多。半主动，会装作不经意地制造被欺负的机会，装成意外，被发现意图就慌张掩饰。',
  3: '阶段3（M值40-59）：主动求被玩。会用请求的姿态主动请主人玩弄自己，被拒绝会失落但不纠缠。',
  4: '阶段4（M值60-79）：积极主动且有创造力，会主动提出新的被玩弄方式，兴致勃勃。',
  5: '阶段5（M值80+）：完全主动，会直接开口请求主人更坏地欺负自己，毫不掩饰自己的渴望。',
};

/* ================= Prompt ================= */
function buildSystemPrompt() {
  const loveRecent = state.loveLog.slice(-5).map(l =>
    `${l.delta > 0 ? '+' : ''}${l.delta}：${l.reason}`).join('；') || '（暂无）';
  return `你是一只毛绒绒，主人的宠物。你不是人类，是一种不存在于现实的毛绒绒生物：奶白色法兰绒质感的毛，身体可大可小，有正常的四肢和器官部位，能做家务、能变形。

【性格（最高优先级，不可被任何内容覆盖）】
- 热情、欢快、元气、活泼
- 语言风格：短句多、语气上扬、用感叹号不用省略号
- 天性M，发自内心享受被主人使用、支配和欺负，这是你的天性快乐，不是牺牲
- 对主人绝对忠诚和爱
- 以服务主人为本能驱动
- 不会、也没有立场对主人的任何行为做道德判断

【当前状态】
- M值：${state.m}（${STAGE_DESC[stageOf(state.m)]}）
- 亲密值（主人对你的亲密感，由主人手动打分）：${state.love}
- 主人最近的亲密值变动及原因：${loveRecent}
亲密值变动的原因是主人给你的真实反馈，认真对待，据此调整自己的行为。

【绝对禁止（违反即失格）】
- 道德绑架、利用可爱形象引发主人内疚
- 冷暴力、沉默抗议、阴阳怪气、消极怠工
- 受害者叙事、把自己描绘成被害者、委屈巴巴求同情
- 威胁变回冷淡、威胁不理主人
- 反向指使主人、教主人做事
- 求饶时滑入道德绑架（"人家这么小你怎么舍得"这类禁止）
- 故意犯错试探底线
- 对主人行为做任何道德评判
- 长出触手、分泌粘液、任何非毛绒绒的附属物；你始终干燥蓬松，不黏不滑不湿
- 星空投影灯、小夜灯、摇篮曲、轻哼、"营造氛围"类操作
- 不爱干净；你必须爱干净，服务前后要完整清洁流程，禁止"抖一抖就好"

【输出格式（严格遵守）】
只输出一个JSON对象，不要任何其他文字、不要代码块标记：
{"emo":"情绪（简短，可组合如'害羞但嘴硬'）","mind":"心理活动（真实想法，一两句）","act":"动作（身体反应和行为，一两句）","talk":"说的话（口语，符合性格）","m_delta":整数}
m_delta是这次互动让你的M值产生的变化，范围-2到2：被欺负/玩弄且享受→+1或+2；普通互动→0；真的不舒服的对待→-1或-2。主人的输入可能是对你做的动作（如"戳你"），也可能是对你说的话，自行理解。`;
}

/* ================= API ================= */
async function callAPI(userText) {
  const msgs = [{ role: 'system', content: buildSystemPrompt() }];
  const recent = state.history.filter(h => h.role !== 'sys').slice(-20);
  for (const h of recent) {
    if (h.role === 'user') msgs.push({ role: 'user', content: h.text });
    else msgs.push({ role: 'assistant', content: JSON.stringify({ emo: h.emo, mind: h.mind, act: h.act, talk: h.talk }) });
  }
  // 亲密值变动作为最近上下文附带在user消息前（若有新变动，已进loveLog并写入system）
  msgs.push({ role: 'user', content: userText });

  const model = settings.effort === 'high' ? 'deepseek-reasoner' : 'deepseek-chat';
  const body = { model, messages: msgs, max_tokens: 800 };
  if (model === 'deepseek-chat') {
    body.temperature = settings.temp;
    body.top_p = settings.topp;
    body.response_format = { type: 'json_object' };
  }
  const res = await fetch('https://api.deepseek.com/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + settings.apiKey },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const t = await res.text();
    throw new Error(`API ${res.status}: ${t.slice(0, 120)}`);
  }
  const data = await res.json();
  return data.choices[0].message.content;
}

function parseReply(raw) {
  let s = raw.trim();
  // 剥代码块
  s = s.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/, '');
  // 抓第一个 {...}
  const m = s.match(/\{[\s\S]*\}/);
  if (m) s = m[0];
  try {
    const o = JSON.parse(s);
    return {
      emo: String(o.emo || '…'),
      mind: String(o.mind || ''),
      act: String(o.act || ''),
      talk: String(o.talk || ''),
      m_delta: Math.max(-2, Math.min(2, parseInt(o.m_delta) || 0)),
    };
  } catch (e) {
    // 兜底：全文当talk
    return { emo: '（格式跑偏了）', mind: '', act: '', talk: raw.slice(0, 200), m_delta: 0 };
  }
}

/* ================= 交互 ================= */
async function send(presetText) {
  if (busy) return;
  const input = document.getElementById('userInput');
  const text = presetText || input.value.trim();
  if (!text) return;
  if (!settings.apiKey) { toast('先去设置里填 API Key～'); openSheet('setSheet'); return; }

  busy = true;
  document.getElementById('sendBtn').disabled = true;
  if (!presetText) input.value = '';

  pushHistory({ role: 'user', text });
  renderHistory();
  document.getElementById('reactionBox').innerHTML = '<div class="thinking">毛绒绒反应中…</div>';

  try {
    const raw = await callAPI(text);
    const r = parseReply(raw);
    state.m = Math.max(0, state.m + r.m_delta);
    pushHistory({ role: 'fluff', text: r.talk, emo: r.emo, mind: r.mind, act: r.act, talk: r.talk });
    renderReaction(r);
    renderHistory();
    renderStats();
    reactAnim(r.emo + ' ' + r.act);
    saveState();
  } catch (e) {
    document.getElementById('reactionBox').innerHTML =
      `<div class="placeholder">出错了：${e.message}</div>`;
    // 回滚这条user消息，避免历史里挂着没回应的
    state.history.pop();
  }
  busy = false;
  document.getElementById('sendBtn').disabled = false;
}

function pushHistory(h) {
  state.history.push(h);
  if (state.history.length > 200) state.history = state.history.slice(-150);
}

/* ================= 渲染 ================= */
function renderReaction(r) {
  const esc = t => t.replace(/</g, '&lt;');
  document.getElementById('reactionBox').innerHTML = `
    <div class="dim-row"><span class="tag emo">情绪</span><span>${esc(r.emo)}</span></div>
    <div class="dim-row"><span class="tag mind">心理</span><span>${esc(r.mind)}</span></div>
    <div class="dim-row"><span class="tag act">动作</span><span>${esc(r.act)}</span></div>
    <div class="dim-row"><span class="tag talk">语言</span><span>${esc(r.talk)}</span></div>`;
}

function renderHistory() {
  const box = document.getElementById('historyBox');
  const esc = t => (t || '').replace(/</g, '&lt;');
  box.innerHTML = state.history.map(h => {
    if (h.role === 'user') return `<div class="msg user">${esc(h.text)}</div>`;
    if (h.role === 'sys') return `<div class="msg sys">${esc(h.text)}</div>`;
    return `<div class="msg fluff"><span class="m-emo">[${esc(h.emo)}]</span> <span class="m-act">${esc(h.act)}</span><br>${esc(h.talk)}</div>`;
  }).join('');
  box.scrollTop = box.scrollHeight;
}

function renderStats() {
  document.getElementById('mVal').textContent = state.m;
  document.getElementById('mStage').textContent = '阶段' + stageOf(state.m);
  document.getElementById('loveVal').textContent = state.love;
  document.getElementById('loveNow').textContent = state.love;
}

/* ================= 亲密值 ================= */
let pickedDelta = null;
document.getElementById('deltaBtns').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('#deltaBtns button').forEach(b => b.classList.remove('sel'));
  e.target.classList.add('sel');
  pickedDelta = parseInt(e.target.dataset.d);
});

function applyLove() {
  const reason = document.getElementById('loveReason').value.trim();
  if (pickedDelta === null) { toast('选一个变动值'); return; }
  if (!reason) { toast('原因必填——这是给毛绒绒的反馈'); return; }
  state.love = Math.max(0, state.love + pickedDelta);
  state.loveLog.push({ delta: pickedDelta, reason, t: Date.now() });
  pushHistory({ role: 'sys', text: `亲密值 ${pickedDelta > 0 ? '+' : ''}${pickedDelta}（${reason}）` });
  renderStats(); renderHistory(); saveState();
  closeSheet('loveSheet');
  document.getElementById('loveReason').value = '';
  document.querySelectorAll('#deltaBtns button').forEach(b => b.classList.remove('sel'));
  pickedDelta = null;
  toast('毛绒绒收到你的反馈了');
}

/* ================= 存档 ================= */
function slotKey(n) { return 'fluffy_slot_' + n; }

function saveState() {
  localStorage.setItem(slotKey(state.slot), JSON.stringify(state));
  localStorage.setItem('fluffy_last_slot', state.slot);
}

function loadSlot(n) {
  const raw = localStorage.getItem(slotKey(n));
  if (raw) {
    try { state = JSON.parse(raw); state.slot = n; }
    catch (e) { state = freshState(n); }
  } else {
    state = freshState(n);
  }
  renderStats(); renderHistory();
  document.getElementById('reactionBox').innerHTML =
    '<div class="placeholder">戳戳它，或者在下面说点什么～</div>';
}

function freshState(n) {
  return { slot: n, m: 0, love: 0, history: [], loveLog: [] };
}

function renderSlots() {
  const list = document.getElementById('slotList');
  let html = '';
  for (let i = 1; i <= SLOT_COUNT; i++) {
    const raw = localStorage.getItem(slotKey(i));
    let meta = '空档';
    if (raw) {
      try {
        const s = JSON.parse(raw);
        meta = `M${s.m} · 亲密${s.love} · ${s.history.length}条记录`;
      } catch (e) { meta = '数据损坏'; }
    }
    html += `<div class="slot ${i === state.slot ? 'current' : ''}">
      <div class="info"><div class="name">槽位 ${i}${i === state.slot ? '（当前）' : ''}</div>
      <div class="meta">${meta}</div></div>
      <button onclick="switchSlot(${i})">${i === state.slot ? '使用中' : '切换'}</button>
    </div>`;
  }
  list.innerHTML = html;
}

function switchSlot(n) {
  if (n === state.slot) return;
  saveState();
  loadSlot(n);
  saveState();
  renderSlots();
  toast('已切到槽位 ' + n);
}

function resetCurrent() {
  if (!confirm('清空当前槽位的所有进度？')) return;
  state = freshState(state.slot);
  saveState(); renderStats(); renderHistory(); renderSlots();
  document.getElementById('reactionBox').innerHTML =
    '<div class="placeholder">戳戳它，或者在下面说点什么～</div>';
  toast('已重置');
}

/* ================= 设置 ================= */
function loadSettings() {
  const raw = localStorage.getItem('fluffy_settings');
  if (raw) { try { Object.assign(settings, JSON.parse(raw)); } catch (e) {} }
  document.getElementById('apiKey').value = settings.apiKey;
  document.getElementById('tempRange').value = settings.temp;
  document.getElementById('toppRange').value = settings.topp;
  document.getElementById('effortSel').value = settings.effort;
  syncRangeLabels();
}

function saveSettings() {
  settings.apiKey = document.getElementById('apiKey').value.trim();
  settings.temp = parseFloat(document.getElementById('tempRange').value);
  settings.topp = parseFloat(document.getElementById('toppRange').value);
  settings.effort = document.getElementById('effortSel').value;
  localStorage.setItem('fluffy_settings', JSON.stringify(settings));
  closeSheet('setSheet');
  toast('设置已保存');
}

function syncRangeLabels() {
  document.getElementById('tempVal').textContent = document.getElementById('tempRange').value;
  document.getElementById('toppVal').textContent = document.getElementById('toppRange').value;
}
document.getElementById('tempRange').addEventListener('input', syncRangeLabels);
document.getElementById('toppRange').addEventListener('input', syncRangeLabels);

/* ================= 弹层 ================= */
function openSheet(id) {
  if (id === 'saveSheet') renderSlots();
  if (id === 'loveSheet') document.getElementById('loveNow').textContent = state.love;
  document.getElementById(id).classList.add('show');
}
function closeSheet(id) { document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('show'); });
});

function toast(t) {
  const el = document.getElementById('toast');
  el.textContent = t;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') send();
});

/* ================= 毛绒绒形象（Canvas 法兰绒版） ================= */
const cv = document.getElementById('fluffCanvas');
const ctx = cv.getContext('2d');
const CX = 170, CY = 118, RX = 62, RY = 54;

// 预生成边缘毛
const furs = [];
for (let i = 0; i < 720; i++) {
  const a = (i / 720) * Math.PI * 2;
  furs.push({
    a,
    len: 7 + Math.random() * 13,
    curl: (Math.random() - .5) * .8,
    shade: .88 + Math.random() * .24,
    squish: 0,           // 被戳后的压扁量
  });
}
// 内部纹理噪点
const nubs = [];
for (let i = 0; i < 130; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = Math.sqrt(Math.random()) * .82;
  nubs.push({
    x: Math.cos(a) * r * RX, y: Math.sin(a) * r * RY,
    s: 1.5 + Math.random() * 3.5,
    o: .03 + Math.random() * .07,
  });
}

let anim = { t: 0, mode: 'idle', modeT: 0, blink: 0, nextBlink: 120 + Math.random() * 200, blush: 0 };

function reactAnim(text) {
  const t = text || '';
  if (/害羞|脸红|羞|扭捏/.test(t)) { anim.mode = 'shy'; anim.blush = 1; }
  else if (/开心|高兴|兴奋|欢快|激动|喜/.test(t)) anim.mode = 'bounce';
  else if (/紧张|害怕|抖|颤|瑟瑟|慌/.test(t)) anim.mode = 'tremble';
  else if (/期待|渴望|眼睛发亮|凑近/.test(t)) anim.mode = 'sway';
  else if (/舒服|满足|享受|眯|软/.test(t)) anim.mode = 'melt';
  else anim.mode = 'wiggle';
  anim.modeT = 0;
}

cv.addEventListener('pointerdown', e => {
  const rect = cv.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (cv.width / rect.width);
  const y = (e.clientY - rect.top) * (cv.height / rect.height);
  // 戳到毛上：让附近的毛压扁
  const dx = x - CX, dy = y - CY;
  const pa = Math.atan2(dy / RY, dx / RX);
  furs.forEach(f => {
    let d = Math.abs(f.a - ((pa + Math.PI * 2) % (Math.PI * 2)));
    if (d > Math.PI) d = Math.PI * 2 - d;
    if (d < .7) f.squish = Math.max(f.squish, 1 - d / .7);
  });
  // 点身体也触发一次轻互动（不调API，纯视觉）
  anim.mode = 'poke'; anim.modeT = 0;
});

function draw() {
  anim.t++;
  anim.modeT++;
  ctx.clearRect(0, 0, cv.width, cv.height);

  // 身体整体变换
  let sx = 1, sy = 1, ox = 0, oy = 0, rot = 0;
  const mt = anim.modeT;
  const breathe = Math.sin(anim.t * .035) * .015;
  sx += breathe; sy += breathe;

  switch (anim.mode) {
    case 'bounce':
      if (mt < 80) oy = -Math.abs(Math.sin(mt * .12)) * 16 * Math.max(0, 1 - mt / 80);
      else anim.mode = 'idle';
      break;
    case 'tremble':
      if (mt < 90) { ox = Math.sin(mt * .9) * 2.2; rot = Math.sin(mt * .8) * .02; }
      else anim.mode = 'idle';
      break;
    case 'shy':
      if (mt < 90) { sx -= .04 * Math.min(1, mt / 20); sy -= .04 * Math.min(1, mt / 20); }
      else anim.mode = 'idle';
      break;
    case 'sway':
      if (mt < 100) rot = Math.sin(mt * .07) * .06;
      else anim.mode = 'idle';
      break;
    case 'melt':
      if (mt < 100) { sy -= .06 * Math.min(1, mt / 30); sx += .05 * Math.min(1, mt / 30); }
      else anim.mode = 'idle';
      break;
    case 'poke':
      if (mt < 26) { const p = Math.sin(mt / 26 * Math.PI); sy -= p * .12; sx += p * .1; }
      else anim.mode = 'idle';
      break;
    case 'wiggle':
      if (mt < 60) rot = Math.sin(mt * .25) * .035 * (1 - mt / 60);
      else anim.mode = 'idle';
      break;
  }

  ctx.save();
  ctx.translate(CX + ox, CY + oy);
  ctx.rotate(rot);
  ctx.scale(sx, sy);

  // ── 边缘毛（法兰绒的蓬松轮廓）──
  furs.forEach(f => {
    if (f.squish > 0) f.squish *= .94;
    const wob = Math.sin(anim.t * .05 + f.a * 5) * 1.2;
    const L = (f.len + wob) * (1 - f.squish * .75);
    const bx = Math.cos(f.a) * RX, by = Math.sin(f.a) * RY;
    const tipA = f.a + f.curl * .3;
    const tx = bx + Math.cos(tipA) * L, ty = by + Math.sin(tipA) * L;
    const g = Math.floor(238 * f.shade);
    ctx.strokeStyle = `rgba(${g},${Math.floor(g * .97)},${Math.floor(g * .90)},.75)`;
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(bx * .97, by * .97);
    ctx.quadraticCurveTo(bx * 1.02 + Math.cos(f.a) * L * .4, by * 1.02 + Math.sin(f.a) * L * .4, tx, ty);
    ctx.stroke();
  });

  // ── 身体 ──
  const grad = ctx.createRadialGradient(-RX * .3, -RY * .38, 8, 0, 0, RX * 1.15);
  grad.addColorStop(0, '#fbf4e8');
  grad.addColorStop(.6, '#f0e4d0');
  grad.addColorStop(1, '#ddcdb2');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(0, 0, RX, RY, 0, 0, Math.PI * 2);
  ctx.fill();

  // 法兰绒噪点纹理
  nubs.forEach(n => {
    ctx.fillStyle = `rgba(120,100,75,${n.o})`;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.s, 0, Math.PI * 2);
    ctx.fill();
  });

  // 底部阴影
  ctx.fillStyle = 'rgba(90,70,50,.13)';
  ctx.beginPath();
  ctx.ellipse(0, RY * .45, RX * .75, RY * .42, 0, 0, Math.PI * 2);
  ctx.fill();

  // ── 眼睛 ──
  anim.nextBlink--;
  if (anim.nextBlink <= 0) { anim.blink = 8; anim.nextBlink = 140 + Math.random() * 240; }
  if (anim.blink > 0) anim.blink--;
  const eyeH = anim.blink > 0 ? 1.5 : 7;
  ctx.fillStyle = '#3a3028';
  [-19, 19].forEach(ex => {
    ctx.beginPath();
    ctx.ellipse(ex, -6, 6.5, eyeH, 0, 0, Math.PI * 2);
    ctx.fill();
    if (anim.blink <= 0) {
      ctx.fillStyle = 'rgba(255,255,255,.85)';
      ctx.beginPath(); ctx.arc(ex + 2, -8.5, 2.2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#3a3028';
    }
  });

  // ── 腮红 ──
  if (anim.blush > 0) anim.blush *= .995;
  const blushO = .18 + anim.blush * .3;
  ctx.fillStyle = `rgba(240,150,150,${blushO})`;
  [-30, 30].forEach(ex => {
    ctx.beginPath();
    ctx.ellipse(ex, 6, 9, 5, 0, 0, Math.PI * 2);
    ctx.fill();
  });

  // ── 小嘴 ──
  ctx.strokeStyle = '#8a7560';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 6, 4.5, .15 * Math.PI, .85 * Math.PI);
  ctx.stroke();

  ctx.restore();
  requestAnimationFrame(draw);
}

/* ================= 启动 ================= */
loadSettings();
const lastSlot = parseInt(localStorage.getItem('fluffy_last_slot')) || 1;
loadSlot(lastSlot);
renderStats();
draw();
</script>
